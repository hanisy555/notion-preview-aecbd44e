<style>
:root {
	--bg: #0b1220;
	--panel: rgba(255, 255, 255, 0.06);
	--panel-border: rgba(255, 255, 255, 0.12);
	--text: rgba(255, 255, 255, 0.92);
	--muted: rgba(255, 255, 255, 0.68);
	--shadow: 0 18px 50px rgba(0, 0, 0, 0.38);
	--red: #ef4444;
	--red2: #b91c1c;
	--blue: #3b82f6;
	--green: #10b981;
	--yellow: #fbbf24;
	--line: rgba(255, 255, 255, 0.1);
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
	margin: 0;
	font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
	background:
		radial-gradient(900px 500px at 15% 10%, rgba(59,130,246,0.28), transparent 60%),
		radial-gradient(900px 500px at 85% 35%, rgba(239,68,68,0.22), transparent 55%),
		radial-gradient(700px 500px at 50% 85%, rgba(16,185,129,0.20), transparent 55%),
		var(--bg);
	color: var(--text);
}

.app {
	max-width: 980px;
	margin: 0 auto;
	padding: 28px 16px 48px;
}

.header { text-align: center; margin-bottom: 16px; }
.title { margin: 0; font-size: 28px; letter-spacing: -0.02em; }
.subtitle { margin: 8px 0 0; color: var(--muted); }

.panel {
	background: var(--panel);
	border: 1px solid var(--panel-border);
	box-shadow: var(--shadow);
	border-radius: 18px;
	padding: 18px;
	margin-top: 14px;
	backdrop-filter: blur(10px);
}

.section-title { margin: 0 0 6px; font-size: 16px; letter-spacing: -0.01em; }
.help { margin: 0 0 12px; color: var(--muted); font-size: 13px; }

.fav-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }

.fav-btn {
	display: flex;
	align-items: center;
	justify-content: center;
	gap: 8px;
	padding: 10px 12px;
	border-radius: 14px;
	border: 1px solid var(--line);
	background: rgba(255,255,255,0.04);
	color: var(--text);
	cursor: pointer;
	transition: transform .12s ease, border-color .12s ease, background .12s ease;
	font-weight: 650;
}

.fav-btn:hover { transform: translateY(-1px); border-color: rgba(255,255,255,0.22); background: rgba(255,255,255,0.06); }
.fav-btn.active { border-color: rgba(59,130,246,0.55); background: rgba(59,130,246,0.18); }

.fav-actions { display: flex; gap: 10px; margin-top: 12px; }

.input {
	flex: 1;
	padding: 10px 12px;
	border-radius: 12px;
	border: 1px solid var(--line);
	background: rgba(0,0,0,0.28);
	color: var(--text);
	outline: none;
}

.input::placeholder { color: rgba(255,255,255,0.45); }

.btn {
	padding: 10px 12px;
	border-radius: 12px;
	border: 1px solid rgba(255,255,255,0.14);
	background: rgba(255,255,255,0.08);
	color: var(--text);
	cursor: pointer;
	transition: transform .12s ease, background .12s ease;
	font-weight: 700;
	white-space: nowrap;
}

.btn:hover { transform: translateY(-1px); background: rgba(255,255,255,0.11); }
.btn:active { transform: translateY(0); }
.btn-ghost { background: rgba(255,255,255,0.04); }

.fav-selected {
	display: flex;
	align-items: center;
	gap: 10px;
	margin-top: 12px;
	padding-top: 12px;
	border-top: 1px solid rgba(255,255,255,0.10);
}

.pill-label {
	font-size: 12px;
	color: rgba(255,255,255,0.72);
	padding: 4px 8px;
	border-radius: 999px;
	border: 1px solid rgba(255,255,255,0.14);
	background: rgba(0,0,0,0.18);
}

.pill-value { font-weight: 800; letter-spacing: -0.01em; }

.ball-wrap { display: flex; justify-content: center; margin: 18px 0 8px; }

.ball-btn {
	width: 160px;
	height: 160px;
	border-radius: 999px;
	border: 0;
	background: transparent;
	position: relative;
	cursor: pointer;
	filter: drop-shadow(0 12px 24px rgba(0,0,0,0.38));
	transition: transform .12s ease;
}

.ball-btn:hover { transform: translateY(-2px); }
.ball-btn:active { transform: translateY(0px) scale(0.98); }

.ball-top, .ball-bot, .ball-mid, .ball-center { position: absolute; left: 0; top: 0; }

.ball-top {
	width: 100%;
	height: 50%;
	background: linear-gradient(180deg, var(--red) 0%, var(--red2) 100%);
	border-top-left-radius: 999px;
	border-top-right-radius: 999px;
}

.ball-bot {
	top: 50%;
	width: 100%;
	height: 50%;
	background: linear-gradient(180deg, #ffffff 0%, #e5e7eb 100%);
	border-bottom-left-radius: 999px;
	border-bottom-right-radius: 999px;
}

.ball-mid {
	top: 50%;
	transform: translateY(-10px);
	width: 100%;
	height: 20px;
	background: #111827;
}

.ball-center {
	top: 50%;
	left: 50%;
	transform: translate(-50%, -50%);
	width: 44px;
	height: 44px;
	border-radius: 999px;
	background: #e5e7eb;
	border: 8px solid #111827;
	box-shadow: inset 0 0 0 3px rgba(0,0,0,0.18);
}

.status-row { display: grid; gap: 8px; justify-items: center; text-align: center; margin-top: 10px; }
.status { color: rgba(255,255,255,0.82); font-weight: 650; }
.cooldown { color: rgba(255,255,255,0.55); font-size: 12px; }

.result-area { margin-top: 14px; display: grid; gap: 10px; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }

.card {
	border: 1px solid rgba(255,255,255,0.12);
	background: rgba(0,0,0,0.18);
	border-radius: 16px;
	padding: 14px;
	display: grid;
	gap: 6px;
}

.poke-img {
	width: 100%;
	aspect-ratio: 1 / 1;
	object-fit: contain;
	border-radius: 12px;
	background: rgba(255,255,255,0.06);
	border: 1px solid rgba(255,255,255,0.10);
}

.card .name { font-weight: 900; letter-spacing: -0.01em; }
.card .meta { font-size: 12px; color: rgba(255,255,255,0.62); }

.badge {
	display: inline-flex;
	align-items: center;
	gap: 6px;
	font-size: 12px;
	font-weight: 800;
	border-radius: 999px;
	padding: 6px 10px;
	width: fit-content;
	border: 1px solid rgba(255,255,255,0.14);
	background: rgba(255,255,255,0.06);
}

.badge.good { border-color: rgba(16,185,129,0.35); background: rgba(16,185,129,0.15); }
.badge.rare { border-color: rgba(59,130,246,0.45); background: rgba(59,130,246,0.18); }
.badge.ultra { border-color: rgba(251,191,36,0.45); background: rgba(251,191,36,0.18); }
.badge.master { border-color: rgba(168,85,247,0.55); background: rgba(168,85,247,0.20); }

.actions-row { display: flex; justify-content: center; margin-top: 14px; }
.footer { text-align: center; margin-top: 14px; color: rgba(255,255,255,0.58); font-size: 12px; }
</style>
